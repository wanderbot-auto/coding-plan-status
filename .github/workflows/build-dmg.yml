name: Build DMG

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-dmg:
    runs-on: macos-14
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show Swift version
        run: swift --version

      - name: Run tests
        run: swift test

      - name: Build app and DMG
        run: |
          chmod +x scripts/build_app.sh
          scripts/build_app.sh

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: coding-plan-status-dmg-${{ github.run_number }}
          path: dist/*.dmg
          if-no-files-found: error

      - name: Upload app artifact
        uses: actions/upload-artifact@v4
        with:
          name: coding-plan-status-app-${{ github.run_number }}
          path: dist/*.app
          if-no-files-found: error

      - name: Package app zip for release
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          APP_PATH="$(ls dist/*.app | head -n 1)"
          APP_BASE="$(basename "${APP_PATH}" .app)"
          ditto -c -k --sequesterRsrc --keepParent "${APP_PATH}" "dist/${APP_BASE}.zip"

      - name: Publish release assets
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.dmg
            dist/*.zip
          fail_on_unmatched_files: true
